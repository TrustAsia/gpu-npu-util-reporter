name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: ubuntu-latest
            suffix: ""
            use-cross: true
          - target: aarch64-apple-darwin
            os: ubuntu-latest
            suffix: ""
            use-cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
            use-cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ---- cross 交叉编译（darwin 目标在 Linux 上编译）----
      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cross
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Test with cross
        if: matrix.use-cross
        run: cross test --target ${{ matrix.target }}

      # ---- Linux musl: 安装 musl-tools + 静态链接 ----
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set musl static linking
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> "$GITHUB_ENV"

      - name: Build
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        if: ${{ !matrix.use-cross }}
        run: cargo test --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-npu-util-reporter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/gpu-npu-util-reporter${{ matrix.suffix }}
          if-no-files-found: error
