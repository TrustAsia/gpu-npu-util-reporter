  build-darwin:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: pip3 install cargo-zigbuild

      - name: Download macOS SDK
        run: |
          curl -L -o MacOSX14.5.sdk.tar.xz \
            https://github.com/joseluisq/macosx-sdks/releases/download/14.5/MacOSX14.5.sdk.tar.xz
          tar -xf MacOSX14.5.sdk.tar.xz

      - name: Build
        env:
          SDKROOT: ${{ github.workspace }}/MacOSX14.5.sdk
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-npu-util-reporter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/gpu-npu-util-reporter
          if-no-files-found: error
