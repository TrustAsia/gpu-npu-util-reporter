name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: ubuntu-latest
            suffix: ""
            use-docker: true
            docker-image: joseluisq/rust-linux-darwin-builder:1.89.0-amd64
          - target: aarch64-apple-darwin
            os: ubuntu-latest
            suffix: ""
            use-docker: true
            docker-image: joseluisq/rust-linux-darwin-builder:1.89.0-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
            use-docker: false
            docker-image: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
            use-docker: false
            docker-image: ""

    steps:
      - uses: actions/checkout@v4

      # ---- Docker 交叉编译（darwin 目标在 Linux 上编译）----
      - name: Build in Docker
        if: matrix.use-docker
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            -w /src \
            ${{ matrix.docker-image }} \
            sh -c "cargo build --release --target ${{ matrix.target }}"

      - name: Test in Docker
        if: matrix.use-docker
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            -w /src \
            ${{ matrix.docker-image }} \
            sh -c "cargo test --target ${{ matrix.target }}"

      # ---- 原生编译（Windows / Linux）----
      - name: Install Rust toolchain
        if: ${{ !matrix.use-docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set musl static linking
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> "$GITHUB_ENV"

      - name: Build
        if: ${{ !matrix.use-docker }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        if: ${{ !matrix.use-docker }}
        run: cargo test --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-npu-util-reporter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/gpu-npu-util-reporter${{ matrix.suffix }}
          if-no-files-found: error
